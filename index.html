<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Engineering Lab Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #f8f9fa; --primary-dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        
        /* Sidebar Styling */
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid #dee2e6; min-height: 100vh; padding: 20px; }
        .filter-group { margin-bottom: 25px; }
        .filter-title { font-weight: bold; font-size: 0.9rem; text-transform: uppercase; color: #6c757d; margin-bottom: 10px; display: block; }
        
        /* Card Styling */
        .inventory-card { border: none; border-radius: 12px; transition: 0.3s; overflow: hidden; height: 100%; }
        .inventory-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.12); }
        .card-img-top { height: 160px; object-fit: cover; background: #e9ecef; }
        
        /* Badge Colors */
        .badge-hang { background-color: #e83e8c; } /* Pink-ish */
        .badge-minh { background-color: #007bff; } /* Blue */
        .badge-shared { background-color: #6c757d; } /* Grey */
        
        .status-tag { font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
        .status-available { background: #d4edda; color: #155724; }
        .status-in-project { background: #fff3cd; color: #856404; }
        .status-borrowed { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar">
            <h4 class="mb-4 text-primary">⚙️ Our Lab</h4>
            
            <div class="filter-group">
                <input type="text" id="searchBox" class="form-control mb-3" placeholder="Search name..." onkeyup="filterInventory()">
            </div>

            <div class="filter-group">
                <span class="filter-title">Owner</span>
                <select id="ownerFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">All Owners</option>
                    <option value="Hang">Hang's</option>
                    <option value="Minh">Minh's</option>
                    <option value="Shared">Shared</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-title">Category</span>
                <select id="categoryFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">All Categories</option>
                    <option value="Brains">Brains (MCU/SBC)</option>
                    <option value="Sensors">Sensors</option>
                    <option value="Actuators">Actuators</option>
                    <option value="Power">Power Supply</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanics">Mechanics (Vít/Mutter)</option>
                    <option value="Tools">Tools/Workshop</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-title">Status</span>
                <select id="statusFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">Any Status</option>
                    <option value="Available">Available</option>
                    <option value="InProject">In Project</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Broken">Broken</option>
                </select>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 px-3">
                <h2 class="fw-bold text-dark">Our Little Engineering Lab Inventory</h2>
                <span class="badge bg-secondary" id="countDisplay">Show all</span>
            </div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-4" id="inventoryGrid">
                
                <div class="col item-card" data-owner="Hang" data-category="Sensors" data-status="Available">
                    <div class="card inventory-card shadow-sm">
                        <img src="https://via.placeholder.com/300x160?text=LiDAR+A1" class="card-img-top" alt="LiDAR">
                        <div class="card-body">
                            <span class="badge badge-hang mb-2">Hang</span>
                            <h5 class="card-title h6 mb-1">RPLIDAR A1M8</h5>
                            <div class="mb-2">
                                <span class="status-tag status-available">Available</span>
                            </div>
                            <p class="text-muted small mb-0">Qty: 1 unit</p>
                            <p class="text-muted small">Loc: Shelf A1</p>
                        </div>
                    </div>
                </div>

                <div class="col item-card" data-owner="Minh" data-category="Actuators" data-status="InProject">
                    <div class="card inventory-card shadow-sm">
                        <img src="https://via.placeholder.com/300x160?text=Nema+17" class="card-img-top" alt="Nema 17">
                        <div class="card-body">
                            <span class="badge badge-minh mb-2">Minh</span>
                            <h5 class="card-title h6 mb-1">Nema 17 Stepper</h5>
                            <div class="mb-2">
                                <span class="status-tag status-in-project">In Project: 3D Printer</span>
                            </div>
                            <p class="text-muted small mb-0">Qty: 4 units</p>
                            <p class="text-muted small">Borrower: No one</p>
                        </div>
                    </div>
                </div>

                <div class="col item-card" data-owner="Shared" data-category="Mechanics" data-status="Available">
                    <div class="card inventory-card shadow-sm">
                        <img src="https://via.placeholder.com/300x160?text=M3+Screws" class="card-img-top" alt="M3 Screws">
                        <div class="card-body">
                            <span class="badge badge-shared mb-2">Shared</span>
                            <h5 class="card-title h6 mb-1">M3 Screw Set (Hex)</h5>
                            <div class="mb-2">
                                <span class="status-tag status-available">Available</span>
                            </div>
                            <p class="text-muted small mb-0">Qty: ~200 pcs</p>
                            <p class="text-muted small">Loc: Blue Box</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<script>
    function filterInventory() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const owner = document.getElementById('ownerFilter').value;
        const category = document.getElementById('categoryFilter').value;
        const status = document.getElementById('statusFilter').value;
        
        const cards = document.querySelectorAll('.item-card');
        let count = 0;

        cards.forEach(card => {
            const cardName = card.querySelector('.card-title').innerText.toLowerCase();
            const cardOwner = card.getAttribute('data-owner');
            const cardCat = card.getAttribute('data-category');
            const cardStatus = card.getAttribute('data-status');

            const matchesSearch = cardName.includes(search);
            const matchesOwner = (owner === 'all' || cardOwner === owner);
            const matchesCat = (category === 'all' || cardCat === category);
            const matchesStatus = (status === 'all' || cardStatus === status);

            if (matchesSearch && matchesOwner && matchesCat && matchesStatus) {
                card.style.display = "block";
                count++;
            } else {
                card.style.display = "none";
            }
        });
        document.getElementById('countDisplay').innerText = `Showing ${count} items`;
    }
</script>
</body>
</html>
