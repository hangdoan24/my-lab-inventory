<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Engineering Lab Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --sidebar-bg: rgba(248, 249, 250, 0.85); 
            --card-bg: rgba(255, 255, 255, 0.9);
            --hang-color: #e83e8c;
            --minh-color: #007bff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Thay link ảnh nền của bạn ở đây */
            background-image: url('https://image.tmdb.org/t/p/original/ufFDsHyPUB6J1St70C5LiDcaAhD.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        /* Sidebar */
        .sidebar { 
            background: var(--sidebar-bg); 
            min-height: 100vh; 
            padding: 25px; 
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* Header Box */
        .main-header {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Inventory Cards */
        .inventory-card { 
            border: none; 
            border-radius: 15px; 
            background: var(--card-bg);
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
        }
        .inventory-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.2); }
        .card-img-top { height: 160px; object-fit: cover; background: #ddd; }

        /* Badges */
        .badge-hang { background-color: var(--hang-color); }
        .badge-minh { background-color: var(--minh-color); }
        .badge-shared { background-color: #6c757d; }
        .status-tag { font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
        .status-Available { background: #d4edda; color: #155724; }
        .status-InProject { background: #fff3cd; color: #856404; }
        .status-Borrowed { background: #f8d7da; color: #721c24; }
        .status-Broken { background: #343a40; color: #fff; }

        /* Modal */
        .modal-content { border-radius: 20px; border: none; overflow: hidden; }
        .modal-header { background: #f8f9fa; }
        #modalImg { border-radius: 10px; width: 100%; object-fit: cover; max-height: 300px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar shadow-sm">
            <h4 class="fw-bold text-primary mb-4">⚙️ Lab Filters</h4>
            
            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Search</label>
                <input type="text" id="searchBox" class="form-control" placeholder="Type name..." onkeyup="filterInventory()">
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Owner</label>
                <select id="ownerFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">All Owners</option>
                    <option value="Hang">Hang's</option>
                    <option value="Minh">Minh's</option>
                    <option value="Shared">Shared</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Category</label>
                <select id="categoryFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">All Categories</option>
                    <option value="Brains">Brains (MCU/SBC)</option>
                    <option value="Sensors">Sensors</option>
                    <option value="Actuators">Actuators</option>
                    <option value="Power">Power Supply</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanics">Mechanics (Schrauben/Mutter)</option>
                    <option value="Tools">Workshop/Tools</option>
                    <option value="Misc">Miscellaneous</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Status</label>
                <select id="statusFilter" class="form-select" onchange="filterInventory()">
                    <option value="all">Any Status</option>
                    <option value="Available">Available</option>
                    <option value="InProject">In Project</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Broken">Broken</option>
                </select>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 py-4 px-4">
            <div class="main-header d-flex justify-content-between align-items-center">
                <h1 class="h3 fw-bold mb-0">🛠️ Our Little Engineering Lab Inventory</h1>
                <span id="countDisplay" class="badge bg-dark rounded-pill">Loading...</span>
            </div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-4" id="inventoryGrid">
                
                <div class="col item-card" 
                     data-owner="Hang" 
                     data-category="Brains" 
                     data-status="Available"
                     data-name="ESP32-S3 Cam"
                     data-qty="2 units"
                     data-note="Dual-core, Wi-Fi, BT. One has an OV2640 camera attached. Be careful with the antenna!"
                     data-datasheet="https://www.espressif.com/sites/default/files/documentation/esp32-s3_datasheet_en.pdf">
                    <div class="card inventory-card shadow-sm" onclick="showDetails(this)">
                        <img src="https://via.placeholder.com/300x160?text=ESP32-S3" class="card-img-top">
                        <div class="card-body">
                            <span class="badge badge-hang mb-2">Hang</span>
                            <h5 class="h6 fw-bold mb-1">ESP32-S3 Cam</h5>
                            <span class="status-tag status-Available">Available</span>
                        </div>
                    </div>
                </div>

                <div class="col item-card" 
                     data-owner="Minh" 
                     data-category="Actuators" 
                     data-status="InProject"
                     data-name="Nema 17 Stepper Motor"
                     data-qty="4 units"
                     data-note="High torque 1.8 degree step. Currently mounted on the 3D Printer project."
                     data-datasheet="https://www.pololu.com/file/0J717/nema17_stepper_motor.pdf">
                    <div class="card inventory-card shadow-sm" onclick="showDetails(this)">
                        <img src="https://via.placeholder.com/300x160?text=Nema+17" class="card-img-top">
                        <div class="card-body">
                            <span class="badge badge-minh mb-2">Minh</span>
                            <h5 class="h6 fw-bold mb-1">Nema 17 Stepper</h5>
                            <span class="status-tag status-InProject">In Project</span>
                        </div>
                    </div>
                </div>

                <div class="col item-card" 
                     data-owner="Shared" 
                     data-category="Mechanics" 
                     data-status="Available"
                     data-name="M3 Screw Set"
                     data-qty="~500 pcs"
                     data-note="Includes M3x6, M3x10, M3x20 and Mutter. Located in the blue organizer box."
                     data-datasheet="https://en.wikipedia.org/wiki/ISO_metric_screw_thread">
                    <div class="card inventory-card shadow-sm" onclick="showDetails(this)">
                        <img src="https://via.placeholder.com/300x160?text=M3+Screws" class="card-img-top">
                        <div class="card-body">
                            <span class="badge badge-shared mb-2">Shared</span>
                            <h5 class="h6 fw-bold mb-1">M3 Screw Set</h5>
                            <span class="status-tag status-Available">Available</span>
                        </div>
                    </div>
                </div>

                </div>
        </main>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <div class="modal-header border-0 shadow-sm">
                <h5 class="modal-title fw-bold" id="modalTitle">Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <img id="modalImg" src="" class="shadow-sm mb-4">
                <div class="px-2">
                    <p class="mb-2"><strong>Quantity:</strong> <span id="modalQty" class="text-primary"></span></p>
                    <p class="mb-3"><strong>Notiz:</strong> <br><span id="modalNote" class="text-muted small"></span></p>
                </div>
            </div>
            <div class="modal-footer border-0">
                <a id="modalDatasheet" href="#" target="_blank" class="btn btn-primary w-100 py-2 fw-bold">📂 Open Datasheet / Link</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Xử lý mở Modal
    function showDetails(element) {
        const item = element.parentElement;
        document.getElementById('modalTitle').innerText = item.getAttribute('data-name');
        document.getElementById('modalImg').src = element.querySelector('img').src;
        document.getElementById('modalQty').innerText = item.getAttribute('data-qty');
        document.getElementById('modalNote').innerText = item.getAttribute('data-note');
        document.getElementById('modalDatasheet').href = item.getAttribute('data-datasheet');
        
        let myModal = new bootstrap.Modal(document.getElementById('itemModal'));
        myModal.show();
    }

    // Xử lý bộ lọc
    function filterInventory() {
        const search = document.getElementById('searchBox').value.toLowerCase();
        const owner = document.getElementById('ownerFilter').value;
        const category = document.getElementById('categoryFilter').value;
        const status = document.getElementById('statusFilter').value;
        
        const cards = document.querySelectorAll('.item-card');
        let count = 0;

        cards.forEach(card => {
            const cardName = card.getAttribute('data-name').toLowerCase();
            const cardOwner = card.getAttribute('data-owner');
            const cardCat = card.getAttribute('data-category');
            const cardStatus = card.getAttribute('data-status');

            const matchesSearch = cardName.includes(search);
            const matchesOwner = (owner === 'all' || cardOwner === owner);
            const matchesCat = (category === 'all' || cardCat === category);
            const matchesStatus = (status === 'all' || cardStatus === status);

            if (matchesSearch && matchesOwner && matchesCat && matchesStatus) {
                card.style.display = "block";
                count++;
            } else {
                card.style.display = "none";
            }
        });
        document.getElementById('countDisplay').innerText = `Total: ${count} items`;
    }

    // Khởi tạo đếm số lượng khi load trang
    window.onload = filterInventory;
</script>
</body>
</html>
