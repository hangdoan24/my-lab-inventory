<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> H&M_Our Little Engineering Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --sidebar-bg: rgba(248, 249, 250, 0.85); 
            --card-bg: rgba(255, 255, 255, 0.9);
            --hang-color: #e83e8c;
            --minh-color: #007bff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url('https://image.tmdb.org/t/p/original/ufFDsHyPUB6J1St70C5LiDcaAhD.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .sidebar { 
            background: var(--sidebar-bg); 
            min-height: 100vh; 
            padding: 25px; 
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .main-header {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .inventory-card { 
            border: none; 
            border-radius: 15px; 
            background: var(--card-bg);
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
            height: 100%;
        }
        .inventory-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.2); }
        .card-img-top { height: 160px; object-fit: cover; background: #ddd; }

        /* Badges */
        .badge-Hang { background-color: var(--hang-color) !important; color: white; }
        .badge-Minh { background-color: var(--minh-color) !important; color: white; }
        .badge-Shared { background-color: #6c757d !important; color: white; }
        
        .status-tag { font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
        .status-Available { background: #d4edda; color: #155724; }
        .status-InProject { background: #fff3cd; color: #856404; }
        .status-Borrowed { background: #f8d7da; color: #721c24; }
        .status-Broken { background: #343a40; color: #fff; }

        .modal-content { border-radius: 20px; border: none; overflow: hidden; }
        #modalImg { border-radius: 10px; width: 100%; object-fit: cover; max-height: 300px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 sidebar shadow-sm">
            <h4 class="fw-bold text-primary mb-4">⚙️ Lab Filters</h4>
            
            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Search</label>
                <input type="text" id="searchBox" class="form-control" placeholder="Type name..." onkeyup="renderInventory()">
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Owner</label>
                <select id="ownerFilter" class="form-select" onchange="renderInventory()">
                    <option value="all">All Owners</option>
                    <option value="Hang">Hang's</option>
                    <option value="Minh">Minh's</option>
                    <option value="Shared">Shared</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Category</label>
                <select id="categoryFilter" class="form-select" onchange="renderInventory()">
                    <option value="all">All Categories</option>
                    <option value="Brains">Brains</option>
                    <option value="Sensors">Sensors</option>
                    <option value="Actuators">Actuators</option>
                    <option value="Power">Power Supply</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Mechanics">Mechanics</option>
                    <option value="Tools">Workshop/Tools</option>
                    <option value="Misc">Miscellaneous</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-muted text-uppercase">Status</label>
                <select id="statusFilter" class="form-select" onchange="renderInventory()">
                    <option value="all">Any Status</option>
                    <option value="Available">Available</option>
                    <option value="InProject">In Project</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="Broken">Broken</option>
                </select>
            </div>
        </nav>

        <main class="col-md-9 col-lg-10 py-4 px-4">
            <div class="main-header d-flex justify-content-between align-items-center">
                <h1 class="h3 fw-bold mb-0">🛠️ Our Little Engineering Lab Inventory</h1>
                <span id="countDisplay" class="badge bg-dark rounded-pill">0 items</span>
            </div>

            <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-4 g-4" id="inventoryGrid">
                </div>
        </main>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <div class="modal-header border-0 shadow-sm">
                <h5 class="modal-title fw-bold" id="modalTitle">Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modalImg" src="" class="shadow-sm mb-4">
                <div class="text-start px-2">
                    <p><strong>Quantity:</strong> <span id="modalQty" class="text-primary"></span></p>
                    <p><strong>Notiz:</strong> <br><span id="modalNote" class="text-muted small"></span></p>
                </div>
            </div>
            <div class="modal-footer border-0">
                <a id="modalDatasheet" href="#" target="_blank" class="btn btn-primary w-100 py-2 fw-bold">📂 Open Datasheet / Link</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let inventoryData = [];

    // Tải dữ liệu từ data.json
    async function loadInventory() {
        try {
            const response = await fetch('data.json');
            inventoryData = await response.json();
            renderInventory();
        } catch (error) {
            console.error("Error loading JSON:", error);
            document.getElementById('inventoryGrid').innerHTML = "<p class='text-white'>Error loading data. Check if data.json exists.</p>";
        }
    }

    function renderInventory() {
        const grid = document.getElementById('inventoryGrid');
        const search = document.getElementById('searchBox').value.toLowerCase();
        const owner = document.getElementById('ownerFilter').value;
        const category = document.getElementById('categoryFilter').value;
        const status = document.getElementById('statusFilter').value;
        
        grid.innerHTML = '';
        let count = 0;

        inventoryData.forEach(item => {
            const matchesSearch = item.name.toLowerCase().includes(search);
            const matchesOwner = (owner === 'all' || item.owner === owner);
            const matchesCat = (category === 'all' || item.category === category);
            const matchesStatus = (status === 'all' || item.status === status);

            if (matchesSearch && matchesOwner && matchesCat && matchesStatus) {
                count++;
                grid.innerHTML += `
                    <div class="col">
                        <div class="card inventory-card shadow-sm" onclick="showModal(${item.id})">
                            <img src="${item.image}" class="card-img-top" onerror="this.src='https://via.placeholder.com/300x160?text=No+Image'">
                            <div class="card-body">
                                <span class="badge badge-${item.owner} mb-2">${item.owner}</span>
                                <h5 class="h6 fw-bold mb-1">${item.name}</h5>
                                <span class="status-tag status-${item.status}">${item.status}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
        document.getElementById('countDisplay').innerText = `Total: ${count} items`;
    }

    function showModal(id) {
        const item = inventoryData.find(i => i.id === id);
        if(!item) return;

        document.getElementById('modalTitle').innerText = item.name;
        document.getElementById('modalImg').src = item.image;
        document.getElementById('modalQty').innerText = item.qty;
        document.getElementById('modalNote').innerText = item.note;
        document.getElementById('modalDatasheet').href = item.datasheet;
        document.getElementById('modalDatasheet').style.display = (item.datasheet === "#" || !item.datasheet) ? "none" : "block";
        
        new bootstrap.Modal(document.getElementById('itemModal')).show();
    }

    window.onload = loadInventory;
</script>
</body>
</html>
